<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verilog Game // Premium RTL Verification Suite</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-darkest: #070913;
            --bg-card: rgba(13, 17, 33, 0.85);
            --border-glow: rgba(0, 242, 254, 0.25);
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --neon-pink: #ff2a85;
            --semantic-pass: #00ff87;
            --semantic-fail: #ff0055;
            --electric-yellow: #fff300;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-darkest);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 242, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 42, 133, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Premium Glassmorphism Cabinet Frame */
        #game-cabinet {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 2px solid var(--border-glow);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.15);
            border-radius: 28px;
            width: 100%;
            max-width: 600px;
            padding: 35px;
            box-sizing: border-box;
            position: relative;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Brand App Icon Container */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .embedded-icon {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4), inset 0 1px 2px rgba(255,255,255,0.2);
            margin-bottom: 12px;
            background: linear-gradient(135deg, #10162e 0%, #060913 100%);
            border: 1px solid rgba(0, 242, 254, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .status-tile {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .tile-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .tile-val {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--neon-cyan);
        }

        .timer-track {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            height: 10px;
            border-radius: 5px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }

        #timer-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--semantic-pass) 0%, var(--neon-cyan) 60%, var(--neon-pink) 100%);
            transition: width 0.1s linear;
        }

        #display-bubble {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 25px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.4);
        }

        #track-header {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--neon-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        #prompt-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
            color: var(--text-main);
        }

        .pads-layout {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .arcade-pad {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 22px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.05s ease, box-shadow 0.05s ease, border-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .arcade-pad:hover:not(:disabled) {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.04);
            transform: translateX(4px);
        }

        .arcade-pad:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.3);
        }

        .launcher-btn {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 rgba(0, 194, 204, 0.3);
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .launcher-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0, 194, 204, 0.3);
        }

        #splash-banner {
            margin-top: 20px;
            padding: 20px;
            border-radius: 16px;
            display: none;
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 700;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .match-glow { 
            background: rgba(0, 255, 135, 0.08); 
            border: 1px solid var(--semantic-pass); 
            color: var(--semantic-pass); 
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.15);
        }
        
        .crush-shatter { 
            background: rgba(255, 0, 85, 0.08); 
            border: 1px solid var(--semantic-fail); 
            color: var(--semantic-fail); 
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.15);
        }

        #advance-track-btn {
            margin-top: 18px;
            background: transparent;
            border: 2px solid var(--electric-yellow);
            color: var(--electric-yellow);
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            font-weight: 800;
            font-size: 1.1rem;
            display: none;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #advance-track-btn:hover {
            background: var(--electric-yellow);
            color: #000;
        }

        .system-utility-row {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .flush-junk-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .flush-junk-btn:hover {
            color: var(--semantic-fail);
            border-color: var(--semantic-fail);
        }

        @media screen and (max-width: 480px) {
            body { padding: 10px; }
            #game-cabinet { padding: 20px; border-radius: 20px; }
            .embedded-icon { width: 75px; height: 75px; border-radius: 16px; }
            h2 { font-size: 1.4rem; }
            .status-grid { gap: 8px; margin-bottom: 18px; }
            .status-tile { padding: 8px; border-radius: 10px; }
            .tile-lbl { font-size: 0.6rem; }
            .tile-val { font-size: 1rem; }
            #display-bubble { padding: 16px; border-radius: 14px; margin-bottom: 18px; }
