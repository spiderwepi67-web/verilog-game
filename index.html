<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verilog Game // Premium RTL Verification Suite</title>
    <style>
        :root {
            --bg-darkest: #070913;
            --bg-card: #0d1121;
            --border-glow: #00f2fe;
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --neon-pink: #ff2a85;
            --semantic-pass: #00ff87;
            --semantic-fail: #ff0055;
            --electric-yellow: #fff300;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-darkest);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        #game-cabinet {
            background: var(--bg-card);
            border: 2px solid var(--border-glow);
            border-radius: 24px;
            width: 100%;
            max-width: 540px;
            padding: 30px;
            box-sizing: border-box;
        }

        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .embedded-icon {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #060913;
            border: 1px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--neon-cyan);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .status-tile {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .tile-lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .tile-val {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--neon-cyan);
        }

        .timer-track {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
            display: none;
        }

        #timer-fill {
            width: 100%;
            height: 100%;
            background: var(--semantic-pass);
        }

        #display-bubble {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        #track-header {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--neon-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #prompt-text {
            font-size: 1.05rem;
            line-height: 1.5;
            margin: 0;
        }

        .pads-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .arcade-pad {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            line-height: 1.4;
            text-align: left;
            transition: all 0.2s;
        }

        .arcade-pad:hover {
            border-color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.05);
        }

        .launcher-btn {
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .launcher-btn:active {
            transform: scale(0.98);
        }

        #splash-banner {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.4;
            font-weight: 700;
        }

        .match-glow { background: rgba(0, 255, 135, 0.1); border: 1px solid var(--semantic-pass); color: var(--semantic-pass); }
        .crush-shatter { background: rgba(255, 0, 85, 0.1); border: 1px solid var(--semantic-fail); color: var(--semantic-fail); }

        #advance-track-btn {
            margin-top: 18px;
            background: transparent;
            border: 2px solid var(--electric-yellow);
            color: var(--electric-yellow);
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            display: none;
            transition: all 0.2s;
        }

        #advance-track-btn:hover {
            background: var(--electric-yellow);
            color: #000;
        }

        .system-utility-row {
            width: 100%;
            max-width: 540px;
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .flush-junk-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.75rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-cabinet">
    <div class="brand-header">
        <svg class="embedded-icon" viewBox="0 0 100 100" fill="none" xmlns="http://w3.org">
            <rect width="100" height="100" rx="16" fill="#060913"/>
            <path d="M25 20 L45 55 L75 15" stroke="#00f2fe" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M30 65 C 50 80, 70 50, 80 35" stroke="#ff9900" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h2>VERILOG GAME</h2>
    </div>
    
    <div class="status-grid">
        <div class="status-tile">
            <div class="tile-lbl">Shields</div>
            <div id="hud-lives" class="tile-val" style="color: var(--semantic-pass);">◆ ◆ ◆</div>
        </div>
        <div class="status-tile">
            <div class="tile-lbl">Score</div>
            <div id="hud-score" class="tile-val">0000</div>
        </div>
        <div class="status-tile">
            <div class="tile-lbl">Record</div>
            <div id="hud-high" class="tile-val" style="color: var(--neon-blue);">0000</div>
        </div>
    </div>

    <div class="timer-track" id="run-meter">
        <div id="timer-fill"></div>
    </div>
    
    <div id="display-bubble">
        <div id="track-header">SYSTEM_READY</div>
        <p id="prompt-text">Welcome, Hardware Architect. Initialize the core verification pipeline to begin testing advanced RTL optimizations and clock crossovers.</p>
    </div>

    <div id="action-cabinet">
        <button class="launcher-btn" onclick="startVerificationBoard()">INITIALIZE CORE PIPELINE 🎮</button>
    </div>

    <div id="splash-banner"></div>
    <button id="advance-track-btn" onclick="nextTrackGate()">COMMIT NODE & ADVANCE ➔</button>
</div>

<div class="system-utility-row">
    <button class="flush-junk-btn" onclick="flushJunkMemory()">Public 🧹 PURGE RUNTIME CACHE</button>
</div>

<script>
    let score = 0, lives = 3, streak = 0, currentTrackPointer = -1, runTimer = null;
    const trackingLimit = 15; 

    const trackSequence = [
        {
            trackName: "NODE_01 // ASYNC_CLOCK_SAMPLING",
            q: "🔥 CLOCK DOMAIN SPLIT: A single-bit streaming sensor signal pulse arrives in a fast 100 MHz source domain and must be sampled safely by a slow 50 MHz destination clock. Hardware FIFOs are completely banned due to layout boundaries. How do you prevent bit data loss?",
            opts: [
                "A) Wire the sensor signal trace directly across to the destination register block.",
                "B) Pass the bit through an intermediate 3-always-block Moore state machine first.",
                "C) Anchor a Toggle Synchronizer in the source domain to extend the pulse, map it over using a 2-stage FF synchronizer, and follow with an edge-detector circuit.",
                "D) Invert the master execution clock domain to latch data on alternate half-cycles."
            ],
            ans: 2,
            ok: "✨ STAGE OK // Pulse extended into a level change in the fast domain, safely sampled by the slow clock via the 2-Stage synchronizer, and reconstructed via edge-detection with zero data loss!",
            err: "💥 SIGNAL TRUNCATION // Direct connections cause setup breaches because the narrow 10ns pulse disappears completely before the slow 20ns clock edge can sample it."
        },
        {
